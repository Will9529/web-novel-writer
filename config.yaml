# ========================================
#   网文 AI 辅写系统 - 配置文件
# ========================================
# 请按照下方说明填写你的配置信息

# ----------------------------------------
# 阿里云通义 API 配置
# ----------------------------------------
# 获取 API Key:
# 1. 访问 https://dashscope.console.aliyun.com/
# 2. 登录/注册阿里云账号
# 3. 进入 "API-KEY 管理"
# 4. 创建新 Key 并复制到这里

aliyun:
  # 【必填】你的 API Key
  api_key: "sk-请在此处填写你的 API Key"
  
  # 【可选】Secret Key（一般不需要）
  secret_key: ""
  
  # API endpoint（一般不需要修改）
  endpoint: "dashscope.aliyuncs.com"
  
  # 【可选】模型选择
  # qwen-turbo  - 速度快，成本低，适合大量生成
  # qwen-plus   - 平衡型，推荐默认使用
  # qwen-max    - 效果最好，成本高，适合关键内容
  model: "qwen-plus"

# ----------------------------------------
# 项目设置
# ----------------------------------------
project:
  # 默认每章字数
  default_chapter_words: 2750
  
  # 是否启用质检
  quality_check_enabled: true
  
  # 是否自动保存
  auto_save: true

# ----------------------------------------
# 禁用词表
# ----------------------------------------
# 这些词在生成时会被检测，命中则提示修改
# 可以根据你的写作风格动态调整

banned_words:
  - 突然      # 高频烂词
  - 瞬间      # 高频烂词
  - 顿时      # 高频烂词
  - 不禁      # 高频烂词
  - 只见      # 高频烂词
  # 在这里添加更多禁用词...

# ========================================
# 配置结束 - 保存后即可启动应用
# ========================================
